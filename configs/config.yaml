run_name: "winter_mcr1_cnn_bilstm_final"
model_type: "cnn_bilstm"
lstm_hidden: 64
lstm_layers: 1
bidirectional: true
seed: 42

# DATA
data_root: "data/cleaned_ravdess/raw"   
sample_rate: 16000                 # set to match your cleaned audio output
train_split: 0.80
val_split: 0.10
test_split: 0.10
batch_size: 32
num_workers: 0

# FEATURES (Mel Spectrogram)
n_mels: 64
n_fft: 1024
hop_length: 256
win_length: 1024
f_min: 0
f_max: null

# Force a fixed spectrogram time dimension (pad/truncate along time frames).
max_frames: 256

# TRAINING
epochs: 15
lr: 0.0007
weight_decay: 0.0001
dropout: 0.35
use_specaugment: false
specaugment_time_mask: 20
specaugment_freq_mask: 8

# CHECKPOINTING
save_every_epochs: 1
early_stopping_patience: 5

# DEVICE
device: "auto"  # "auto", "cpu", or "cuda"
